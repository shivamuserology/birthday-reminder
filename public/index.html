<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Reminder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header class="header">
      <div class="logo-section">
        <h1>Birthdays</h1>
        <p>Manage and automatically send birthday reminders.</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline" id="btn-test-email">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Test Email
        </button>
        <button class="btn btn-outline" id="btn-check-now">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Check Now
        </button>
      </div>
    </header>

    <section class="stats-row">
      <div class="stat-card">
        <div class="stat-label">
          Total Directory
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="stat-number" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">
          Next 30 Days
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div class="stat-number" id="stat-upcoming">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">
          This Month
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <div class="stat-number" id="stat-this-month">0</div>
      </div>
    </section>

    <div class="main-grid">
      <div class="left-column">
        <div class="card">
          <div class="card-header">
            <div class="card-title">Add New</div>
          </div>
          <div class="card-content form-wrapper">
            <form id="birthday-form">
              <div class="form-group">
                <label for="input-name">Name</label>
                <input type="text" id="input-name" placeholder="John Doe" required autocomplete="off">
              </div>
              <div class="form-group">
                <label for="input-dob">Date of Birth</label>
                <input type="date" id="input-dob" required>
              </div>
              <div class="form-group">
                <label for="input-relationship">Relationship</label>
                <input type="text" id="input-relationship" placeholder="Colleague, Friend, etc." autocomplete="off">
              </div>
              <button type="submit" class="btn btn-primary" id="btn-submit">Add Contact</button>
            </form>
          </div>
        </div>
        
        <div class="card">
          <div class="card-header">
            <div class="card-title">Upcoming</div>
          </div>
          <div class="card-content list-container" id="upcoming-list"></div>
        </div>
      </div>

      <div class="right-column">
        <div class="card">
          <div class="card-header">
            <div class="card-title">Directory</div>
            <div class="search-box">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="search-input" placeholder="Search...">
            </div>
          </div>
          <div class="card-content list-container" id="birthday-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Contact</h3>
        <button class="btn-ghost" style="border:none; cursor:pointer;" id="btn-close-modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="card-content form-wrapper">
        <form id="edit-form">
          <input type="hidden" id="edit-id">
          <div class="form-group">
            <label for="edit-name">Name</label>
            <input type="text" id="edit-name" required>
          </div>
          <div class="form-group">
            <label for="edit-dob">Date of Birth</label>
            <input type="date" id="edit-dob" required>
          </div>
          <div class="form-group">
            <label for="edit-relationship">Relationship</label>
            <input type="text" id="edit-relationship">
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-outline" id="btn-cancel-edit">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
